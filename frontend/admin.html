<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionar productos — Lana & Lino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>
<div class="page-wrapper">

  <header class="header">
    <div class="header-inner">
      <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
      <div class="header-izq"><div class="buscador"><input type="text" placeholder="Buscar..."><button type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button></div></div>
      <div class="header-logo"><a href="index.html">Lana &amp; Lino</a></div>
      <div class="header-der">
        <a href="carrito.html" class="btn-icono"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg></a>
        <button class="btn-admin visible" id="btn-admin" type="button">Gestionar</button>
        <button class="btn-sesion" id="btn-sesion" type="button">Iniciar sesión</button>
        <button class="toggle-oscuro" id="btn-oscuro" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
      </div>
    </div>
  </header>

  <main>
    <div class="cabecera-pagina">
      <div class="cabecera-pagina-inner">
        <h1>Gestionar productos</h1>
        <p>Cargá y editá los productos del catálogo</p>
      </div>
    </div>
    <div class="admin-contenedor contenedor">

      <!--Form nuevo producto-->
      <div class="admin-form-caja">
        <h3>Cargar producto</h3>
        <form id="form-admin" novalidate>
          <div class="form-grupo">
            <label class="form-label" for="admin-nombre">Nombre</label>
            <input class="form-input" type="text" id="admin-nombre" required>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="admin-descripcion">Descripción</label>
            <textarea class="form-textarea" id="admin-descripcion" required></textarea>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="admin-precio">Precio</label>
            <input class="form-input" type="number" id="admin-precio" min="0" required>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="admin-genero">Género</label>
            <select class="form-select" id="admin-genero" required>
              <option value="">Seleccioná</option>
              <option value="Femenino">Femenino</option>
              <option value="Masculino">Masculino</option>
              <option value="Unisex">Unisex</option>
            </select>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="admin-categoria">Categoría</label>
            <select class="form-select" id="admin-categoria" required>
              <option value="">Cargando...</option>
            </select>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="admin-imagen">URL de imagen</label>
            <input class="form-input" type="text" id="admin-imagen" placeholder="https://...">
          </div>
          <button class="btn btn-primario btn-full" type="submit">Guardar producto</button>
        </form>
      </div>

      <!--Tabla de productos-->
      <div class="admin-tabla-caja">
        <table class="admin-tabla">
          <thead>
            <tr>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Género</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="admin-tabla-body">
            <tr><td colspan="6" style="text-align:center;color:var(--texto-muted);padding:24px">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="footer-pie" style="max-width:var(--ancho-max);margin:0 auto;padding:16px 24px">
      <p>© 2025 Lana &amp; Lino.</p>
      <p>Desarrollado por Ilan Ariel Pitashny</p>
    </div>
  </footer>

</div>
<script src="js/api.js"></script>
<script src="js/header.js"></script>
<script src="js/app.js"></script>
</body>
</html>
