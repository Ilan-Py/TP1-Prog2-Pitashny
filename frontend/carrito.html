<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito — Lana & Lino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>
<div class="page-wrapper">

  <header class="header">
    <div class="header-inner">
      <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <div class="header-izq">
        <div class="buscador">
          <input type="text" placeholder="Buscar productos..." onkeydown="if(event.key==='Enter') window.location.href='index.html'">
          <button type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
        </div>
      </div>
      <div class="header-logo"><a href="index.html">Lana &amp; Lino</a></div>
      <div class="header-der">
        <a href="favoritos.html" class="btn-icono" title="Favoritos"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></a>
        <a href="perfil.html" class="btn-icono" title="Mi cuenta"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
        <a href="carrito.html" class="btn-icono" title="Carrito"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span class="badge badge-carrito" style="display:none">0</span></a>
        <button class="btn-admin" id="btn-admin" type="button">Gestionar</button>
        <button class="btn-sesion" id="btn-sesion" type="button">Iniciar sesión</button>
        <button class="toggle-oscuro" id="btn-oscuro" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
      </div>
    </div>
  </header>

  <main>
    <div class="cabecera-pagina">
      <div class="cabecera-pagina-inner">
        <h1>Mi carrito</h1>
      </div>
    </div>
    <div class="layout-carrito contenedor">
      <div id="carrito-lista">
        <p style="color:var(--texto-muted)">Cargando...</p>
      </div>
      <aside class="carrito-resumen">
        <h3>Resumen</h3>
        <div class="resumen-linea"><span>Subtotal</span><span id="carrito-total">$0</span></div>
        <div class="resumen-total"><span>Total</span><span id="carrito-total-2">$0</span></div>
        <br>
        <a href="pago.html" class="btn btn-primario btn-full btn-lg">Ir a pagar</a>
        <br><br>
        <a href="index.html" class="btn btn-ghost btn-full btn-sm">Seguir comprando</a>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-pie" style="max-width:var(--ancho-max);margin:0 auto;padding:16px 24px">
      <p>© 2025 Lana &amp; Lino.</p>
      <p>Desarrollado por Ilan Ariel Pitashny</p>
    </div>
  </footer>

</div>
<script src="js/api.js"></script>
<script src="js/header.js"></script>
<script src="js/app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const total2 = document.getElementById("carrito-total-2");
    const obs = new MutationObserver(() => {
      if (total2) total2.textContent = document.getElementById("carrito-total")?.textContent || "$0";
    });
    const totalEl = document.getElementById("carrito-total");
    if (totalEl) obs.observe(totalEl, { childList: true, characterData: true, subtree: true });
  });
</script>
</body>
</html>
