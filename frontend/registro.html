    <!--Lana & Lino - Registro-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse — Lana & Lino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>
<div class="page-wrapper">

  <header class="header">
    <div class="header-inner">
      <div></div>
      <div class="header-logo"><a href="index.html">Lana &amp; Lino</a></div>
      <div class="header-der">
        <button class="toggle-oscuro" id="btn-oscuro" type="button" title="Cambiar tema">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="auth-contenedor">
      <div class="auth-caja">
        <h2>Crear cuenta</h2>
        <p class="auth-subtitulo">Completá tus datos para registrarte</p>

        <form class="auth-form" id="form-registro" novalidate>
          <div class="form-grupo">
            <label class="form-label" for="reg-nombre">Nombre</label>
            <input class="form-input" type="text" id="reg-nombre" placeholder="Tu nombre" required>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="reg-apellido">Apellido</label>
            <input class="form-input" type="text" id="reg-apellido" placeholder="Tu apellido" required>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="reg-email">Email</label>
            <input class="form-input" type="email" id="reg-email" placeholder="tu@email.com" required>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="reg-telefono">Teléfono</label>
            <input class="form-input" type="text" id="reg-telefono" placeholder="+54 9 342 000-0000" required>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="reg-direccion">Dirección</label>
            <input class="form-input" type="text" id="reg-direccion" placeholder="Calle 123, Ciudad" required>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="reg-password">Contraseña</label>
            <input class="form-input" type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="form-grupo">
            <label class="form-label" for="reg-password2">Repetir contraseña</label>
            <input class="form-input" type="password" id="reg-password2" placeholder="Repetí la contraseña" required>
          </div>
          <button class="btn btn-primario btn-full btn-lg" type="submit">Crear cuenta</button>
        </form>

        <p class="auth-footer">¿Ya tenés cuenta? <a href="login.html">Iniciá sesión</a></p>
      </div>
    </div>
  </main>

</div>
<script src="js/api.js"></script>
<script src="js/header.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
